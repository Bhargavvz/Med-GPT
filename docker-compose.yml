# MedGPT — Docker Compose with GPU Support

services:
  medgpt:
    build: .
    container_name: medgpt
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./configs:/app/configs
      - ./data/processed:/app/data/processed
      - ./results:/app/results
      - huggingface-cache:/app/.cache/huggingface
    environment:
      - MEDGPT_CONFIG=/app/configs/config.yaml
      - MEDGPT_ADAPTER=/app/checkpoints/finetune/best_model
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

volumes:
  huggingface-cache:
